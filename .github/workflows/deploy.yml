name: Deploy PupWiki to Cloudflare Pages

on:
  push:
    branches:
      - pupwiki
      - Pupwiki
  pull_request:
    branches:
      - pupwiki
      - Pupwiki

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Enrich homepage hero images with Pexels
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: npm run images:hero:ci

      - name: Refresh generated content
        run: npm run content:refresh

      - name: Enrich content images with Pexels
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: npm run images:content:ci

      - name: Sync AWIN affiliate data
        env:
          AWIN_OAUTH2_TOKEN: ${{ secrets.AWIN_OAUTH2_TOKEN }}
          AWIN_PRODUCT_FEED_API_KEY: ${{ secrets.AWIN_PRODUCT_FEED_API_KEY }}
          AWIN_PUBLISHER_ID: '2861861'
          AWIN_COUNTRY_CODE: 'US'
        run: npm run awin:sync:strict

      - name: Audit AWIN affiliate data
        run: npm run awin:audit:strict

      - name: Generate PupWiki partner profiles
        run: npm run partners:generate

      - name: Sync Amazon products
        run: npm run amazon:sync

      - name: Audit content inventory and opportunities
        run: npm run content:inventory

      - name: Enrich breed galleries
        run: npm run images:enrich:ci

      - name: Generate sitemap
        run: npm run sitemap:generate

      - name: Build Astro site
        env:
          PUBLIC_GA_MEASUREMENT_ID: ${{ secrets.PUBLIC_GA_MEASUREMENT_ID }}
          PUBLIC_AMAZON_TAG: ${{ secrets.PUBLIC_AMAZON_TAG }}
          PUBLIC_ENABLE_AMAZON_BUTTONS: ${{ vars.PUBLIC_ENABLE_AMAZON_BUTTONS }}
          PUBLIC_ENABLE_AWIN_MASTERTAG: ${{ vars.PUBLIC_ENABLE_AWIN_MASTERTAG }}
          PUBLIC_EMAILOCTOPUS_URL: ${{ secrets.PUBLIC_EMAILOCTOPUS_URL }}
        run: npm run build:fast

      - name: Audit Amazon products
        run: npm run amazon:audit

      - name: Deploy to Cloudflare Pages with Wrangler
        if: github.event_name == 'push'
        run: npx wrangler pages deploy dist --project-name=pupwiki
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
